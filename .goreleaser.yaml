# GoReleaser config — cross-platform release builds.
# Works because recap is pure Go (modernc.org/sqlite): CGO_ENABLED=0 lets us
# cross-compile every target from one machine. Run: goreleaser release --clean
version: 2

project_name: recap

before:
  hooks:
    - go mod tidy

builds:
  - id: recap
    main: ./cmd/recap
    binary: recap
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: recap
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: sandeepshekhar26
    name: recap
